name: NutriGain CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------------------------
  # 1. Backend Code Integrity Check
  # ----------------------------------------------------------------------------
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Python Compile Check
        run: python -m compileall backend/app

  # ----------------------------------------------------------------------------
  # 2. Frontend Code Integrity Check
  # ----------------------------------------------------------------------------
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Production Build
        working-directory: frontend
        run: npm run build

  # ----------------------------------------------------------------------------
  # 3. Docker Compose & Container Build Verification
  # ----------------------------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI env file
        run: |
          cat > .env << 'EOF'
          MYSQL_DATABASE=food_recommender
          MYSQL_USER=nutrigain
          MYSQL_PASSWORD=test_password
          MYSQL_ROOT_PASSWORD=root_password
          DB_PORT=3307
          BACKEND_PORT=8000
          APP_ENV=test
          DATABASE_URL=mysql+pymysql://nutrigain:test_password@db:3306/food_recommender
          JWT_SECRET_KEY=test-secret-key-for-ci
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          FRONTEND_PORT=5173
          VITE_API_BASE_URL=http://localhost:8000
          GOOGLE_CLIENT_ID=test-google-client-id.apps.googleusercontent.com
          VITE_GOOGLE_CLIENT_ID=test-google-client-id.apps.googleusercontent.com
          EOF

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Build Docker Compose Images
        run: docker compose build

  # ----------------------------------------------------------------------------
  # 4. Continuous Deployment to Server via SSH
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== Starting NutriGain Deployment ==="
            
            # Navigate to the application directory (create if it doesn't exist)
            mkdir -p ~/NutriGain
            cd ~/NutriGain
            
            # Sync workspace files
            if [ -d ".git" ]; then
              echo "Pulling latest code from main branch..."
              git fetch --all
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            # Recreate production environment variables securely
            echo "Recreating .env file..."
            cat <<EOF > .env
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            BACKEND_PORT=${{ secrets.BACKEND_PORT || 8000 }}
            FRONTEND_PORT=${{ secrets.FRONTEND_PORT || 5173 }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            APP_ENV=${{ secrets.APP_ENV || 'production' }}
            DATABASE_URL=mysql+pymysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@db:3306/${{ secrets.MYSQL_DATABASE }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            EOF
            
            echo ".env file successfully generated."
            
            # Tear down and spin up containers
            echo "Stopping old containers..."
            docker compose down --remove-orphans
            
            echo "Building and starting new containers..."
            docker compose up -d --build
            
            echo "Displaying container status..."
            docker compose ps
            
            # Perform Post-Deployment Health Check
            echo "Waiting for application services to spin up and database to be healthy..."
            sleep 15
            
            HEALTH_URL="http://localhost:${{ secrets.BACKEND_PORT || 8000 }}/api/v1/health"
            echo "Hitting healthcheck endpoint: ${HEALTH_URL}"
            
            if curl -s -f "$HEALTH_URL" | grep -q '"status":"ok"'; then
              echo "=========================================="
              echo "🎉 DEPLOYMENT HEALTH CHECK PASSED!"
              echo "=========================================="
            else
              echo "=========================================="
              echo "❌ DEPLOYMENT HEALTH CHECK FAILED!"
              echo "=========================================="
              docker compose logs backend --tail=50
              exit 1
            fi
