name: NutriGain CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------------------------
  # 1. Backend Code Integrity Check
  # ----------------------------------------------------------------------------
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Python Compile Check
        run: python -m compileall backend/app

  # ----------------------------------------------------------------------------
  # 2. Frontend Code Integrity Check
  # ----------------------------------------------------------------------------
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Production Build
        working-directory: frontend
        run: npm run build

  # ----------------------------------------------------------------------------
  # 3. Docker Compose & Container Build Verification
  # ----------------------------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI env file
        run: |
          cat > .env << 'EOF'
          MYSQL_DATABASE=food_recommender
          MYSQL_USER=nutrigain
          MYSQL_PASSWORD=test_password
          MYSQL_ROOT_PASSWORD=root_password
          DB_PORT=3307
          BACKEND_PORT=8000
          APP_ENV=test
          DATABASE_URL=mysql+pymysql://nutrigain:test_password@db:3306/food_recommender
          JWT_SECRET_KEY=test-secret-key-for-ci
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          FRONTEND_PORT=5173
          VITE_API_BASE_URL=http://localhost:8000
          GOOGLE_CLIENT_ID=test-google-client-id.apps.googleusercontent.com
          VITE_GOOGLE_CLIENT_ID=test-google-client-id.apps.googleusercontent.com
          EOF
          
          mkdir -p backend
          cat > backend/.env << EOF
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          EOF

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Build Docker Compose Images
        run: docker compose build
