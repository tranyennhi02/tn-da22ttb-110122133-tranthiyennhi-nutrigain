services:
  db:
    image: mysql:8.4
    container_name: nutrigain-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-food_recommender}
      MYSQL_USER: ${MYSQL_USER:-nutrigain}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-yennhi2602}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nutrigain-backend
    restart: unless-stopped
    env_file:
      - .env
      - ./backend/.env
    environment:
      APP_NAME: NutriGain API
      APP_ENV: ${APP_ENV:-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: mysql+pymysql://nutrigain:yennhi2602@db:3306/food_recommender
      FOOD_DATASET_PATH: ${FOOD_DATASET_PATH:-/app/food_dataset_fixed.csv}
      RAW_DATA_PATH: ${RAW_DATA_PATH:-/app/food_dataset_fixed.csv}
      SCALED_DATA_PATH: ${SCALED_DATA_PATH:-/app/food_dataset_fixed.csv}
      USER_HISTORY_PATH: ${USER_HISTORY_PATH:-/app/user_history.csv}
      PREFERENCE_MODEL_PATH: ${PREFERENCE_MODEL_PATH:-/app/preference_model.joblib}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-before-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      HF_HOME: /app/.cache/huggingface
      ENABLE_INGREDIENT_IMAGE_RECOGNITION: ${ENABLE_INGREDIENT_IMAGE_RECOGNITION:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:8000}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    container_name: nutrigain-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:8000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  huggingface_cache:
